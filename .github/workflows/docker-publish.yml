name: Docker Build & Push

on:
  workflow_dispatch:
    inputs:
      push_dockerhub:
        description: 'Push images to Docker Hub (true/false)'
        required: false
        default: 'true'
      push_aliyun:
        description: 'Push images to Aliyun ACR (true/false)'
        required: false
        default: 'true'
  push:
    branches:
      - master
      - main
      - dev
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  backend:
    name: Build & push backend image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push_dockerhub == 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Aliyun ACR
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push_aliyun == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: crpi-cbkazoyqsrh7o1rk.cn-shanghai.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Docker Hub metadata
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push_dockerhub == 'true' }}
        id: meta_dh
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/classroom-backend
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=ref,event=tag

      - name: Aliyun ACR metadata
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push_aliyun == 'true' }}
        id: meta_aliyun
        uses: docker/metadata-action@v6
        with:
          images: crpi-cbkazoyqsrh7o1rk.cn-shanghai.personal.cr.aliyuncs.com/classrooom/class_github_01
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/backend/Dockerfile
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push_dockerhub == 'true' || inputs.push_aliyun == 'true' }}
          tags: |
            ${{ steps.meta_dh.outputs.tags }}
            ${{ steps.meta_aliyun.outputs.tags }}
          labels: |
            ${{ steps.meta_dh.outputs.labels }}
            ${{ steps.meta_aliyun.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend:
    name: Build & push frontend image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push_dockerhub == 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Aliyun ACR
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push_aliyun == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: crpi-cbkazoyqsrh7o1rk.cn-shanghai.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Docker Hub metadata
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push_dockerhub == 'true' }}
        id: meta_dh
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/classroom-frontend
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=ref,event=tag

      - name: Aliyun ACR metadata
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push_aliyun == 'true' }}
        id: meta_aliyun
        uses: docker/metadata-action@v6
        with:
          images: crpi-cbkazoyqsrh7o1rk.cn-shanghai.personal.cr.aliyuncs.com/classrooom/class_github_frontend
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push_dockerhub == 'true' || inputs.push_aliyun == 'true' }}
          tags: |
            ${{ steps.meta_dh.outputs.tags }}
            ${{ steps.meta_aliyun.outputs.tags }}
          labels: |
            ${{ steps.meta_dh.outputs.labels }}
            ${{ steps.meta_aliyun.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

