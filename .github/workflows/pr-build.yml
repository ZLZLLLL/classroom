name: PR Build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
      - main
      - dev

permissions:
  contents: read

jobs:
  backend-build:
    name: Backend Build (Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: classroom
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build backend
        run: mvn -B -DskipTests clean package

  frontend-build:
    name: Frontend Build (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build