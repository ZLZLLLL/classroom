server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # --- Basic hardening headers (safe defaults) ---
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # If you DO need to embed this site in an iframe, remove/adjust this.
  add_header X-Frame-Options "SAMEORIGIN" always;

  # --- gzip (reduce JS/CSS transfer size) ---
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml;

  # Vite SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Avoid caching HTML so new deployments take effect immediately.
  location = /index.html {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  # Cache built static assets aggressively (Vite uses hashed filenames under /assets/)
  location ^~ /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # Reverse proxy API to backend (same docker network)
  # Frontend axios baseURL is "/api/v1", so we proxy the whole /api/* tree.
  location ^~ /api/ {
    proxy_pass http://backend:8080;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support (if backend uses it)
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";

    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
  }

  # WebSocket / SockJS endpoint used by Spring STOMP: /ws
  # (SockJS will call subpaths like /ws/info, /ws/{server-id}/{session-id}/websocket)
  location ^~ /ws {
    proxy_pass http://backend:8080;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";

    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    3600s;
  }
}

