server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Vite SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Optional: proxy API to backend (same docker network)
  # location /api/ {
  #   proxy_pass http://backend:8080/api/;
  # }
}

