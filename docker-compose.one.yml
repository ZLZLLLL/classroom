services:
  mysql:
    image: mysql:8.0
    container_name: classroom-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-classroom}
      MYSQL_USER: ${MYSQL_USER:-classroom}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-classroom123}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: classroom-redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  mongodb:
    image: mongo:7
    container_name: classroom-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-classroom}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-classroom123}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-classroom}
    ports:
      - "${MONGO_PORT:-27018}:27017"
    volumes:
      - mongodb-data:/data/db

  backend:
    #image: ${BACKEND_IMAGE:-yourname/classroom-backend:dev}
    image: crpi-cbkazoyqsrh7o1rk.cn-shanghai.personal.cr.aliyuncs.com/classrooom/class_github_01:sha-51bf840
    container_name: classroom-backend
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-classroom}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-classroom}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-classroom123}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-classroom}:${MONGO_INITDB_ROOT_PASSWORD:-classroom123}@mongodb:27017/${MONGO_INITDB_DATABASE:-classroom}?authSource=admin
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      - mysql
      - redis
      - mongodb

  frontend:
    #image: ${FRONTEND_IMAGE:-yourname/classroom-frontend:dev}
    image: crpi-cbkazoyqsrh7o1rk.cn-shanghai.personal.cr.aliyuncs.com/classrooom/class_github_frontend:master
    container_name: classroom-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  redis-data:
  mongodb-data:

